version: '3.8'

services:
  # Base de Datos Centralizada para la Escuela
  db-mysql:
    image: mysql:8.0
    container_name: db_mysql_escuela
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - escuela-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servidor Eureka (Descubrimiento)
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - escuela-network
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    networks:
      - escuela-network
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/

  # Microservicio Estudiante
  estudiante-service:
    build: ./Estudiante
    container_name: estudiante-service
    ports:
      - "8081:8081"
    depends_on:
      db-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - escuela-network
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/db_estudiante?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root

  # Microservicio Curso
  curso-service:
    build: ./Curso
    container_name: curso-service
    ports:
      - "8082:8082"
    depends_on:
      db-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - escuela-network
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/db_cursos?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - GATEWAY_URL=http://api-gateway:8080

  # Microservicio Matricula
  matricula-service:
    build: ./Matricula
    container_name: matricula-service
    ports:
      - "8083:8083"
    depends_on:
      db-mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - escuela-network
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/db_matricula?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - GATEWAY_URL=http://api-gateway:8080

  # Microservicio Asistencia
  asistencia-service:
