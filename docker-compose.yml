      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/db_asistencia?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
