server.port=${PORT:8082}
spring.application.name=ms-cursos

# Eureka Server
eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Base de Datos (MIGRADO A POSTGRESQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/db_cursos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# Comunicaciones con otros Microservicios (vía Gateway)
profesor-service.url=${GATEWAY_URL:http://localhost:8080}/api/v1/profesores
carrera-service.url=${GATEWAY_URL:http://localhost:8080}/api/v1/carreras

# Documentación Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/hal+json