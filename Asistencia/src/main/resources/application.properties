server.port=8084
spring.application.name=ms-asistencias


eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_asistencia}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}


curso-service.url=${GATEWAY_URL:http://localhost:8080}/api/v1/cursos
estudiante-service.url=${GATEWAY_URL:http://localhost:8080}/api/v1/estudiantes

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.default-produces-media-type=application/hal+json

